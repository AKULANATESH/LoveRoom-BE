services:
  postgres_db:
    container_name: together-postgres
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nani}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-together_db}
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-nani} -d $${POSTGRES_DB:-together_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - api-network

volumes:
  postgres_data:

networks:
  api-network:
    driver: bridge
